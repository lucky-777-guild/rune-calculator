<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ユーザー登録</title>
</head>
<body>

  <h2>ユーザー登録</h2>

  <label>ニックネーム</label><br>
  <input id="nickname"><br><br>

  <label>PID</label><br>
  <input id="pid"><br><br>

  <button onclick="register()">登録する</button>

  <p><a href="login.html">ログインはこちら</a></p>

  <p style="font-size: 14px; color: #555; margin-top: 20px;">
    【PIDの確認方法】<br>
    ゲーム内の「設定」→「アカウント情報」から確認できます。<br>
    表示されている「PID」をコピーして、このフォームに貼り付けてください。<br>
    ※PIDはあなたのアカウントを識別する大切な番号です。他の人に共有しないようご注意ください。
  </p>

<script>
async function register() {
  const nickname = document.getElementById("nickname").value;
  const pid = document.getElementById("pid").value;

  if (!nickname || !pid) {
    alert("ニックネームとPIDを入力してください");
    return;
  }

  const res = await fetch("http://192.168.1.8:3000/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nickname, pid })
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
  } else {
    alert("登録が完了しました！");
    location.href = "login.html";
  }
}
</script>

</body>
</html>
